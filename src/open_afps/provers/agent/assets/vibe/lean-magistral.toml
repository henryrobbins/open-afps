# Stand-in for the real Leanstral `lean` agent that runs the same Lean scaffold on
# Magistral, Mistral's frontier reasoning model. `labs-leanstral-2603` is Labs-gated
# (403 until a Mistral org admin enables Labs models); Magistral is non-Labs and any
# La Plateforme key can reach it today. Unlike the Devstral stand-in, this points at
# a reasoning model (thinking on) for a better shot at long structured proofs.
# Selected via the `leanstral:magistral` registry name. Switch to the real model with
# `--agent lean` (registry name `leanstral`) once Labs is enabled.
display_name = "Lean (Magistral)"
description = "Lean agent scaffold on Magistral, a non-Labs reasoning model (Leanstral stand-in until Labs is enabled)"
safety = "neutral"
agent_type = "agent"
system_prompt_id = "lean"
active_model = "leanstral-standin"

[[providers]]
name = "mistral-standin"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "reasoning"
backend = "generic"

[[models]]
name = "magistral-medium-latest"
provider = "mistral-standin"
alias = "leanstral-standin"
temperature = 0.2
thinking = "off"
auto_compact_threshold = 168000

[tools.bash]
default_timeout = 1200
