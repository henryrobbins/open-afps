# Stand-in for the real Leanstral `lean` agent while `labs-leanstral-2603` is
# Labs-gated (403 until a Mistral org admin enables Labs models). This mirrors
# vibe's builtin `lean` agent profile -- same Lean system prompt and bash-driven
# Lean workflow -- but points active_model at a non-Labs Mistral model that any
# La Plateforme key can reach today. Vibe has no `--model` flag, so the model is
# templated in: the VibeHarness substitutes `<<MODEL>>` (the config `model`,
# default `magistral-medium-latest`) when it writes this profile into the workdir.
# Switch back to the real model with `--agent lean` once Labs is enabled.
display_name = "Lean (stand-in)"
description = "Lean agent scaffold on a non-Labs Mistral model (Leanstral stand-in until Labs is enabled)"
safety = "neutral"
agent_type = "agent"
system_prompt_id = "lean"
active_model = "leanstral-standin"

[[providers]]
name = "mistral-standin"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "reasoning"
backend = "generic"

[[models]]
name = "<<MODEL>>"
provider = "mistral-standin"
alias = "leanstral-standin"
temperature = 0.2
# Keep "off": vibe rejects the agent profile (silently -> "Agent not found") on
# other values, and Magistral still reasons server-side via api_style="reasoning".
thinking = "off"
auto_compact_threshold = 168000

[tools.bash]
default_timeout = 1200
